name: Publish container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: build + push ghcr.io/${{ github.repository_owner }}/feedling
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/feedling
          # lowercase owner to satisfy ghcr's naming rules
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$IMAGE:$COMMIT_SHORT,$IMAGE:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture image digest
        run: |
          echo "Published: ${{ steps.tags.outputs.tags }}"
          echo "Digest tracked in run logs; pin from the docker.build output above."
