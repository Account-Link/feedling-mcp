name: Retire prod5 CVM + VPS (one-time decommission)

# Tear down the legacy prod5 CVM and the 54.209.126.4 VPS *after* the
# prod9 migration is confirmed green (iOS audit 6/6, CLI audit 8/8).
#
# This workflow is DESTRUCTIVE and IRREVERSIBLE.
#   - The prod5 CVM is deleted from Phala Cloud (billing stops; encrypted
#     data volumes go away — we migrated to multi-tenant clean reinstall
#     so there was nothing worth preserving).
#   - The VPS systemd units (feedling-backend, feedling-mcp) are stopped,
#     disabled, and masked. The box itself keeps running (user's call
#     whether to cancel the VPS contract separately).
#   - Any lingering Cloudflare A records pointing at 54.209.126.4 on the
#     feedling.app zone are purged as a belt-and-suspenders clean-up.
#
# Safety gates:
#   1. `confirm` input must equal "yes-delete-prod5".
#   2. Repo variable `CVM_ID` must NOT equal the hardcoded prod5 UUID —
#      this means bootstrap-prod9.yml has already flipped the variable
#      to the new CVM. If someone tries to run this before bootstrap,
#      the workflow refuses.
#
# The prod5 vm_uuid is hardcoded here (not pulled from CVM_ID) because
# CVM_ID is set to the NEW CVM by the time this runs. Hardcoding also
# prevents a "misuse of the current CVM_ID" foot-gun.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type EXACTLY "yes-delete-prod5" to confirm destruction of the prod5 CVM + VPS stack.'
        required: true
        default: 'no'

concurrency:
  group: retire-prod5-vps
  cancel-in-progress: false

jobs:
  retire:
    name: retire prod5 CVM + VPS
    runs-on: ubuntu-24.04
    env:
      # Hardcoded — this workflow has a single fixed target.
      PROD5_VM_UUID: 4386636e-1325-4b92-99d8-f2ca00befdb4
      PROD5_APP_ID:  051a174f2457a6c474680a5d745372398f97b6ad

    steps:
      - name: Gate on explicit confirmation
        if: ${{ github.event.inputs.confirm != 'yes-delete-prod5' }}
        run: |
          echo "::error::confirm input must be exactly 'yes-delete-prod5' to proceed; got '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Gate on CVM_ID already flipped away from prod5
        env:
          CVM_ID: ${{ vars.CVM_ID }}
        run: |
          set -euo pipefail
          if [ "$CVM_ID" = "$PROD5_VM_UUID" ]; then
            echo "::error::CVM_ID repo variable still points at prod5 ($PROD5_VM_UUID)."
            echo "::error::Run bootstrap-prod9.yml first — it flips CVM_ID to the new prod9 CVM."
            exit 1
          fi
          if [ -z "$CVM_ID" ]; then
            echo "::error::CVM_ID is unset — bootstrap-prod9 hasn't run yet."
            exit 1
          fi
          echo ">>> CVM_ID is $CVM_ID (prod9), not $PROD5_VM_UUID (prod5) — safe to proceed"

      - uses: actions/checkout@v4

      - name: Install phala CLI + jq
        run: |
          npm install -g phala
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl openssh-client

      # ---------------------------------------------------------------
      # (1) Delete the prod5 CVM. Idempotent — if already gone, CLI exits
      # non-zero; we swallow that.
      # ---------------------------------------------------------------
      - name: phala cvms delete prod5
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set +e  # idempotent — "already deleted" is fine
          echo ">>> checking prod5 CVM state"
          STATE=$(phala cvms get "$PROD5_VM_UUID" -j --api-token "$PHALA_CLOUD_API_KEY" 2>/dev/null \
            | jq -r '.status // "gone"')
          echo ">>> prod5 state: $STATE"
          if [ "$STATE" = "gone" ] || [ -z "$STATE" ] || [ "$STATE" = "null" ]; then
            echo ">>> prod5 CVM already deleted — nothing to do"
            exit 0
          fi
          echo ">>> deleting prod5 CVM $PROD5_VM_UUID"
          phala cvms delete "$PROD5_VM_UUID" --force --api-token "$PHALA_CLOUD_API_KEY"
          # Verify deletion — poll until status disappears (or 2 min timeout).
          for i in $(seq 1 24); do
            S=$(phala cvms get "$PROD5_VM_UUID" -j --api-token "$PHALA_CLOUD_API_KEY" 2>/dev/null \
              | jq -r '.status // "gone"')
            echo "  check $i → $S"
            if [ "$S" = "gone" ] || [ "$S" = "null" ] || [ -z "$S" ]; then
              echo ">>> prod5 CVM deleted"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::prod5 CVM deletion submitted but status still visible — may still be propagating"

      # ---------------------------------------------------------------
      # (2) Stop + disable + mask the VPS systemd units.
      # The services run as user `openclaw` under user-level systemd.
      # We reach them via SSH as `openclaw` (VPS_DEPLOY_KEY is that
      # user's authorized_keys key).
      # ---------------------------------------------------------------
      - name: Stop + mask VPS systemd units
        env:
          VPS_HOST:       ${{ vars.VPS_HOST }}
          VPS_USER:       ${{ vars.VPS_USER }}
          VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$VPS_DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes -o ConnectTimeout=20"
          echo ">>> connecting to $VPS_USER@$VPS_HOST"

          # Quote the heredoc with 'EOF' so bash on our side doesn't
          # expand $variables — everything runs server-side.
          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" bash -s <<'EOF'
          set -euo pipefail
          echo "=== remote: systemd --user status before ==="
          systemctl --user status feedling-backend feedling-mcp --no-pager || true

          echo "=== remote: stopping units ==="
          systemctl --user stop    feedling-backend feedling-mcp || true
          systemctl --user disable feedling-backend feedling-mcp || true
          # Mask prevents any future `enable` or dependency auto-start.
          systemctl --user mask    feedling-backend feedling-mcp || true

          # Keep the repo in place for forensics but drop a tombstone so
          # anyone SSHing in knows the box is retired.
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > ~/RETIRED.md <<TOMB
          # Feedling VPS — RETIRED $TS

          This VPS was the pre-2026-04-21 production host for Feedling at
          \`api.feedling.app\` and \`mcp.feedling.app\`. It was retired when the
          stack moved to a pure-CVM architecture on Phala dstack-pha-prod9.

          The \`feedling-backend\` and \`feedling-mcp\` systemd user units are
          stopped, disabled, and masked. \`unmask\` will NOT bring them back
          in a working state — the ingress TLS / DNS are owned by the CVM now.

          Source of truth: repo root, \`deploy/docker-compose.phala.yaml\`.
          TOMB

          echo "=== remote: systemd --user status after ==="
          systemctl --user status feedling-backend feedling-mcp --no-pager || true

          echo "=== remote: tombstone ==="
          cat ~/RETIRED.md
          EOF

          # Purge the ssh key from the runner (defense in depth; runner is
          # ephemeral but still).
          rm -f ~/.ssh/id_deploy

      # ---------------------------------------------------------------
      # (3) Belt-and-suspenders: purge any Cloudflare records still
      # pointing at the VPS IP. bootstrap-prod9.yml purges api/mcp
      # pre-deploy, so this typically no-ops — but a human may have
      # re-added one by hand during debugging.
      # ---------------------------------------------------------------
      - name: Purge stale CF records → 54.209.126.4
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID:   ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          echo ">>> listing feedling.app records → content=54.209.126.4"
          RESP=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?content=54.209.126.4&per_page=100")
          if ! echo "$RESP" | jq -e '.success' >/dev/null; then
            echo "::error::CF list failed: $RESP"
            exit 1
          fi
          COUNT=$(echo "$RESP" | jq '.result | length')
          echo ">>> found $COUNT records pointing at the old VPS IP"
          if [ "$COUNT" = "0" ]; then exit 0; fi
          echo "$RESP" | jq -r '.result[] | "\(.id)\t\(.type)\t\(.name)"' | \
          while IFS=$'\t' read -r id type name; do
            echo ">>> deleting $type $name ($id)"
            DEL=$(curl -sS -X DELETE \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$id")
            if ! echo "$DEL" | jq -e '.success' >/dev/null; then
              echo "::error::CF delete failed for $id: $DEL"
              exit 1
            fi
          done

      # ---------------------------------------------------------------
      # (4) Drop the now-stale VPS_HOST / VPS_USER repo variables and
      # the VPS_DEPLOY_KEY secret. Reduces attack surface — nothing in
      # CI should try to SSH the retired box.
      # ---------------------------------------------------------------
      - name: Remove stale VPS GH variables + secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh variable delete VPS_HOST       || true
          gh variable delete VPS_USER       || true
          gh secret   delete VPS_DEPLOY_KEY || true
          echo ">>> VPS_* secrets/vars removed"

      - name: Summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## prod5 + VPS retired

          | Resource | Disposition |
          |----------|-------------|
          | prod5 CVM (\`$PROD5_VM_UUID\`) | \`phala cvms delete\` |
          | VPS systemd units | stopped, disabled, masked |
          | VPS tombstone | \`~/RETIRED.md\` on the VPS |
          | CF records → 54.209.126.4 | purged |
          | \`VPS_HOST\` / \`VPS_USER\` / \`VPS_DEPLOY_KEY\` | removed from repo |

          The feedling stack is now **CVM-only** on dstack-pha-prod9.
          EOF
