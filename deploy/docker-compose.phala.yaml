# Feedling — Phala TDX CVM compose.
#
# This compose runs inside a Phala dstack CVM. The compose_hash of this
# file is what the on-chain FeedlingAppAuth contract authorizes and what
# iOS's audit card replays out of RTMR3.
#
# Run locally first to confirm healthy:
#   docker compose -f deploy/docker-compose.phala.yaml pull
#   docker compose -f deploy/docker-compose.phala.yaml up -d
#
# Deploy to Phala:
#   phala deploy -c deploy/docker-compose.phala.yaml -n feedling-enclave
#
# After deploy:
#   1. Read CVM's public URL from `phala cvms get <name>`
#   2. Compute compose_hash with deploy/publish-compose-hash.sh
#   3. Publish hash on-chain via FeedlingAppAuth.addComposeHash
#   4. Point iOS app's enclave URL at the CVM (Settings or env var)
#
# CRITICAL: every literal in this file becomes part of the compose_hash.
# Any ${VAR} below must be category (A) — cosmetic / non-security.
# See deploy/docker-compose.yaml for the full env-var hygiene rules.

name: feedling-enclave

services:
  enclave:
    image: ghcr.io/account-link/feedling:169cb6a
    command: ["python", "-u", "backend/enclave_app.py"]
    restart: unless-stopped
    environment:
      # --- BAKED: security-relevant ---
      FEEDLING_ENCLAVE_PORT: "5003"
      FEEDLING_DATA_DIR: "/data"
      # Phase 3: terminate TLS inside the enclave. With this on,
      # bootstrap() derives a dstack-KMS-bound ECDSA P-256 cert and
      # bakes sha256(cert.DER) into REPORT_DATA. Clients verify the
      # live cert by comparing sha256(DER) to the attested value —
      # the self-signed chain is expected; PKI trust is not the model.
      FEEDLING_ENCLAVE_TLS: "true"
      # Enclave calls Flask for whoami + ciphertext fetch. Override the
      # 127.0.0.1 default because services are distinct containers on the
      # compose network.
      FEEDLING_FLASK_URL: "http://backend:5001"
      # NOTE: intentionally NOT setting DSTACK_SIMULATOR_ENDPOINT.
      # dstack-sdk treats "is this env var PRESENT?" as "use simulator"
      # even when the value is empty, so an empty string would make it
      # try to connect to "" and fail with EINVAL. Leaving the var unset
      # lets dstack-sdk fall through to /var/run/dstack.sock (mounted
      # below). Only set this on dev laptops running the simulator.
    ports:
      - "5003:5003"
    volumes:
      - feedling_enclave_data:/data
      # dstack-sdk talks to the host's dstack daemon via this socket.
      # Phala CVM auto-creates /var/run/dstack.sock on the host; mounting
      # it into the container lets us call get_quote/get_key/etc.
      - /var/run/dstack.sock:/var/run/dstack.sock
    healthcheck:
      # Liveness (not readiness): any HTTP response from Flask — including
      # 503 while dstack-sdk boot is in flight — counts as healthy. If we
      # required /healthz=200, a slow first-quote generation would fail
      # the healthcheck window and take the whole compose down with it.
      # Real readiness is confirmed externally by /attestation returning
      # 200 (iOS audit card does this).
      #
      # -k is required because the enclave serves a self-signed cert
      # whose trust comes from the attestation, not from a local CA
      # bundle; inside the container there's no way to pin against
      # REPORT_DATA for this liveness ping anyway.
      test: ["CMD-SHELL", "curl -k -s -o /dev/null -w '%{http_code}' https://127.0.0.1:5003/healthz | grep -qE '^(200|503)$'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    image: ghcr.io/account-link/feedling:169cb6a
    command: ["python", "-u", "backend/app.py"]
    restart: unless-stopped
    environment:
      FEEDLING_API_KEY: ""
      FEEDLING_DATA_DIR: "/data"
      FEEDLING_WS_PORT: "9998"
      # enclave service serves HTTPS since Phase 3. verify is disabled
      # inside the compose network — the trust model is REPORT_DATA pin
      # from outside, not PKI from inside.
      FEEDLING_ENCLAVE_URL: "https://enclave:5003"
    ports:
      - "5001:5001"
      - "9998:9998"
    volumes:
      - feedling_backend_data:/data
    depends_on:
      enclave:
        condition: service_healthy

  mcp:
    image: ghcr.io/account-link/feedling:169cb6a
    command: ["python", "-u", "backend/mcp_server.py"]
    restart: unless-stopped
    environment:
      FEEDLING_API_KEY: ""
      FEEDLING_FLASK_URL: "http://backend:5001"
      # When set, MCP routes content reads (chat/memory/identity) through
      # the enclave's decrypt proxy so agents see plaintext. Writes still
      # go to Flask (which stores the ciphertext MCP wrapped for them).
      FEEDLING_ENCLAVE_URL: "https://enclave:5003"
      FEEDLING_MCP_PORT: "5002"
      FEEDLING_MCP_TRANSPORT: "sse"
      # Phase C.1 fallback: dstack-KMS self-signed cert. Used when
      # FEEDLING_ACME_DOMAIN is unset (e.g., local dev without CF token).
      FEEDLING_MCP_TLS: "true"
      # Phase C.2: ACME-DNS-01 via Cloudflare. When set, MCP acquires a
      # Let's Encrypt cert for this domain at boot and serves it on port
      # 5002. The cert key is derived from dstack-KMS ('feedling-mcp-tls-v1')
      # so its public key fingerprint is stable and pre-computed by the
      # enclave service for the attestation bundle.
      FEEDLING_ACME_DOMAIN: "mcp.feedling.app"
      FEEDLING_ACME_EMAIL: "sxysun9@gmail.com"
      FEEDLING_TLS_CACHE_DIR: "/tls"
      # FEEDLING_ACME_STAGING: "false"   # set to "true" to test against LE staging
      # CF_ZONE_ID and CF_API_TOKEN must be injected via Phala's encrypted
      # environment variable channel — do NOT hardcode here (they are not
      # part of the compose_hash but must not appear in plaintext in the file).
      FEEDLING_CF_ZONE_ID: "${CF_ZONE_ID}"
      FEEDLING_CF_API_TOKEN: "${CF_API_TOKEN}"
    ports:
      - "5002:5002"
    volumes:
      # dstack socket for key derivation (cert key + account key from dstack-KMS).
      - /var/run/dstack.sock:/var/run/dstack.sock
      # Persistent TLS cert cache: avoids hitting LE rate limits (5 certs/week)
      # on every container restart. Only the cert PEM is here; the key is
      # regenerated from dstack-KMS (stable across reboots, no persistence needed).
      - feedling_mcp_tls_data_v2:/tls
    depends_on:
      backend:
        condition: service_started

volumes:
  feedling_enclave_data:
    name: feedling_enclave_data
  feedling_backend_data:
    name: feedling_backend_data
  feedling_mcp_tls_data_v2:
    name: feedling_mcp_tls_data_v2
