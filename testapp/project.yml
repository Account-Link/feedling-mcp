name: FeedlingTest

options:
  bundleIdPrefix: com.feedling.mcp
  deploymentTarget:
    iOS: "16.2"
  xcodeVersion: "15"

settings:
  DEVELOPMENT_TEAM: DC9JH5DRMY
  SWIFT_VERSION: "5.9"

targets:

  FeedlingTest:
    type: application
    platform: iOS
    bundleId: com.feedling.mcp
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingTest
      - path: Shared
    entitlements:
      path: FeedlingTest/FeedlingTest.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingTest/Info.plist
      properties:
        CFBundleDisplayName: Feedling Test
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.feedling.mcp
            CFBundleURLSchemes:
              - feedlingtest
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - remote-notification
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: FeedlingTestWidget
      - target: FeedlingBroadcast
      - target: FeedlingBroadcastSetupUI

  FeedlingBroadcast:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.broadcast
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingBroadcast
    entitlements:
      path: FeedlingBroadcast/FeedlingBroadcast.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingBroadcast/Info.plist
      properties:
        CFBundleDisplayName: Feedling Broadcast
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.broadcast

  FeedlingBroadcastSetupUI:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.broadcastSetupUI
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingBroadcastSetupUI
    entitlements:
      path: FeedlingBroadcastSetupUI/FeedlingBroadcastSetupUI.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingBroadcastSetupUI/Info.plist
      properties:
        CFBundleDisplayName: Feedling Broadcast Setup
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-setupui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).BroadcastSetupViewController
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.broadcastSetupUI

  FeedlingTestWidget:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.widget
    deploymentTarget: "16.2"
    sources:
      - path: FeedlingTestWidget
      - path: Shared
    entitlements:
      path: FeedlingTestWidget/FeedlingTestWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.feedling.mcp
    info:
      path: FeedlingTestWidget/Info.plist
      properties:
        CFBundleDisplayName: Feedling Widget
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.widget
