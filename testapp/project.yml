name: FeedlingTest

options:
  bundleIdPrefix: com.feedling.mcp
  deploymentTarget:
    iOS: "16.1"
  xcodeVersion: "15"

settings:
  DEVELOPMENT_TEAM: DC9JH5DRMY
  SWIFT_VERSION: "5.9"

targets:

  FeedlingTest:
    type: application
    platform: iOS
    bundleId: com.feedling.mcp
    deploymentTarget: "16.1"
    sources:
      - path: FeedlingTest
      - path: Shared
    entitlements:
      path: FeedlingTest/FeedlingTest.entitlements
    info:
      path: FeedlingTest/Info.plist
      properties:
        CFBundleDisplayName: Feedling Test
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - remote-notification
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: FeedlingTestWidget

  FeedlingTestWidget:
    type: app-extension
    platform: iOS
    bundleId: com.feedling.mcp.widget
    deploymentTarget: "16.1"
    sources:
      - path: FeedlingTestWidget
      - path: Shared
    entitlements:
      path: FeedlingTestWidget/FeedlingTestWidget.entitlements
    info:
      path: FeedlingTestWidget/Info.plist
      properties:
        CFBundleDisplayName: Feedling Widget
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      DEVELOPMENT_TEAM: DC9JH5DRMY
      PRODUCT_BUNDLE_IDENTIFIER: com.feedling.mcp.widget
